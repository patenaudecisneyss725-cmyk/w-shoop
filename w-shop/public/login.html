<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W的店铺 - 登录/注册</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #1a1a2e;
      margin-bottom: 30px;
    }
    .tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-size: 16px;
      color: #666;
    }
    .tab.active {
      color: #e94560;
      border-bottom: 2px solid #e94560;
      margin-bottom: -2px;
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #333; }
    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #e94560; }
    button {
      width: 100%;
      padding: 15px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .error-msg {
      color: #e74c3c;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .back-home {
      text-align: center;
      margin-top: 20px;
    }
    .back-home a { color: #666; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 W的店铺</h1>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">登录</div>
      <div class="tab" onclick="switchTab('register')">注册</div>
    </div>
    
    <!-- 登录表单 -->
    <div id="loginForm">
      <div class="form-group">
        <label>手机号码</label>
        <input type="tel" id="loginPhone" placeholder="请输入手机号" pattern="[0-9]{11}">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button onclick="doLogin()">登录</button>
      <p class="error-msg" id="loginError"></p>
    </div>
    
    <!-- 注册表单 -->
    <div id="registerForm" style="display: none;">
      <div class="form-group">
        <label>手机号码</label>
        <input type="tel" id="regPhone" placeholder="请输入手机号" pattern="[0-9]{11}">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label>昵称（可选）</label>
        <input type="text" id="regName" placeholder="请输入昵称">
      </div>
      <button onclick="doRegister()">注册</button>
      <p class="error-msg" id="regError"></p>
    </div>
    
    <div class="back-home">
      <a href="index.html">← 返回首页</a>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tab === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
      } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
      }
    }

    async function doLogin() {
      const phone = document.getElementById('loginPhone').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!phone || !password) {
        showError('loginError', '请填写手机号和密码');
        return;
      }
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('w_user', JSON.stringify(data.user));
          location.href = 'index.html';
        } else {
          showError('loginError', data.error);
        }
      } catch (e) {
        showError('loginError', '网络错误');
      }
    }

    async function doRegister() {
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const name = document.getElementById('regName').value.trim();
      
      if (!phone || !password) {
        showError('regError', '请填写手机号和密码');
        return;
      }
      
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password, name })
        });
        
        const data = await res.json();
        
        if (data.success) {
          alert('注册成功，请登录');
          switchTab('login');
          document.getElementById('loginPhone').value = phone;
        } else {
          showError('regError', data.error);
        }
      } catch (e) {
        showError('regError', '网络错误');
      }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
